version: '3.8'

services:
  tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracker
    restart: unless-stopped
    ports:
      - "8086:8000"
    volumes:
      - /data/tracker:/app/data
    env_file:
      - .env
    environment:
      - SCRAPE_TIME=06:00
      - SCRAPE_INTERVAL_HOURS=24
      - TZ=America/Sao_Paulo
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=8000
      - TURSO_URL=${TURSO_URL}
      - TURSO_TOKEN=${TURSO_TOKEN}
      # AUTH_PASSWORD e JWT_SECRET gerados automaticamente se não definidos
      # Defina-os aqui para fixar valores permanentes
      - AUTH_USER=${AUTH_USER}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE_HOURS=24
    networks:
      - tracker-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  tracker-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
