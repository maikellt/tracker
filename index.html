<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CashbackTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:        #0A0A0B;
      --surface:   #111113;
      --surface2:  #18181B;
      --border:    #222226;
      --border2:   #2E2E34;
      --text:      #EBEBEB;
      --text2:     #8A8A96;
      --text3:     #52525B;
      --accent:    #F59E0B;
      --accent-dim:#7C4F06;
      --green:     #22C55E;
      --red:       #EF4444;
      --yellow:    #F59E0B;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
      --radius:    6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .logo {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.04em;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .health-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
    }
    .health-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text3);
      transition: background .4s;
    }
    .health-dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .health-dot.err { background: var(--red);   box-shadow: 0 0 6px var(--red); }

    /* ── Tabs ── */
    nav.tabs {
      display: flex;
      gap: 0;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text2);
      cursor: pointer;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 18px;
      transition: color .2s, border-color .2s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Main ── */
    main { padding: 24px; max-width: 1200px; margin: 0 auto; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Alert Banner ── */
    .alerta-banner {
      background: rgba(245,158,11,.1);
      border: 1px solid var(--accent-dim);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Filters Bar ── */
    .filters-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    select, input[type="text"], input[type="url"], input[type="number"], input[type="time"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      transition: border-color .2s;
    }
    select:focus, input:focus { border-color: var(--accent); }
    select { cursor: pointer; }

    .dropdown-wrapper { position: relative; }
    .dropdown-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text2);
      cursor: pointer;
      font-family: var(--sans);
      font-size: 13px;
      padding: 7px 10px;
      transition: border-color .2s, color .2s;
    }
    .dropdown-btn:hover { border-color: var(--border2); color: var(--text); }
    .dropdown-btn.active { border-color: var(--accent); color: var(--accent); }
    .dropdown-panel {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      min-width: 180px;
      padding: 8px 0;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      display: none;
    }
    .dropdown-panel.open { display: block; }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
    }
    .dropdown-item:hover { background: var(--border); }
    .dropdown-item input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      user-select: none;
    }
    .toggle-label input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; }

    /* ── Cards Row ── */
    .cards-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .card-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text3);
      margin-bottom: 6px;
    }
    .card-value {
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 500;
      color: var(--accent);
    }
    .card-meta {
      font-size: 11px;
      color: var(--text2);
      margin-top: 4px;
    }

    /* ── Chart Card ── */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
    }
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .chart-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text2);
    }
    .dias-toggle { display: flex; gap: 4px; }
    .dias-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text2);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      transition: all .2s;
    }
    .dias-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* ── Table ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid var(--border); }
    th {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text3);
      padding: 10px 14px;
      text-align: left;
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--text);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--surface2); }
    .mono { font-family: var(--mono); }
    .text2 { color: var(--text2); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
    }
    .badge-green { background: rgba(34,197,94,.12); color: var(--green); }
    .badge-red   { background: rgba(239,68,68,.12);  color: var(--red); }
    .badge-gray  { background: rgba(82,82,91,.2);    color: var(--text3); }
    .badge-amber { background: rgba(245,158,11,.12); color: var(--accent); }

    .row-disabled td { opacity: .45; }

    /* ── Sites Tab ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text2);
    }
    .form-card {
      margin-bottom: 20px;
      padding: 16px;
    }
    .form-card h3 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text2);
      margin-bottom: 12px;
    }
    .form-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .form-row input { flex: 1; min-width: 140px; }

    /* ── Buttons ── */
    .btn {
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      padding: 7px 14px;
      transition: opacity .2s, background .2s;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary  { background: var(--accent); color: #000; }
    .btn-danger   { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
    .btn-ghost    { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* ── Feedback ── */
    .feedback {
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 10px;
      padding: 8px 12px;
    }
    .feedback.hidden { display: none; }
    .feedback.ok  { background: rgba(34,197,94,.1);  color: var(--green); border: 1px solid rgba(34,197,94,.3); }
    .feedback.err { background: rgba(239,68,68,.1);  color: var(--red);   border: 1px solid rgba(239,68,68,.3); }
    .feedback.info{ background: rgba(245,158,11,.1); color: var(--accent);border: 1px solid rgba(245,158,11,.3); }

    /* ── Config Tab ── */
    .config-card { max-width: 420px; }
    .config-card h3 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text2);
      margin-bottom: 16px;
    }
    .config-form { display: flex; flex-direction: column; gap: 14px; }
    .config-form label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .config-form input { font-family: var(--mono); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      max-width: 360px;
      padding: 24px;
      width: 90%;
    }
    .modal p { color: var(--text); font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

    /* ── Loading ── */
    .loading {
      color: var(--text3);
      font-size: 13px;
      padding: 32px;
      text-align: center;
    }

    /* ── Inline site feedback ── */
    .site-feedback {
      font-size: 12px;
      font-family: var(--mono);
    }
    .site-feedback.ok  { color: var(--green); }
    .site-feedback.err { color: var(--red); }
    .site-feedback.info{ color: var(--accent); }

    /* ── Access toggle ── */
    .access-toggle {
      accent-color: var(--accent);
      cursor: pointer;
      width: 14px; height: 14px;
    }

    /* ── URL truncate ── */
    .url-cell {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text2);
      font-size: 12px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text3);
      font-size: 13px;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <span class="logo">◈ cashback_tracker</span>
    <div class="header-right">
      <div class="health-badge">
        <span class="health-dot" id="health-dot"></span>
        <span id="health-label">—</span>
      </div>
    </div>
  </header>

  <!-- Tab Nav -->
  <nav class="tabs">
    <button class="tab-btn active" data-tab="painel">Painel</button>
    <button class="tab-btn" data-tab="sites">Sites</button>
    <button class="tab-btn" data-tab="config">Configurações</button>
  </nav>

  <!-- Main Content -->
  <main>

    <!-- ═══════════ PAINEL ═══════════ -->
    <div id="tab-painel" class="tab-content active">
      <div id="alertas-container"></div>

      <div class="filters-bar">
        <select id="site-select"></select>

        <div class="dropdown-wrapper">
          <button class="dropdown-btn" id="parceiros-filter-btn">Parceiros</button>
          <div class="dropdown-panel" id="parceiros-dropdown"></div>
        </div>

        <label class="toggle-label">
          <input type="checkbox" id="filtro-acesso">
          Somente com acesso
        </label>
      </div>

      <div class="cards-row" id="cards-row">
        <div class="card"><div class="loading">—</div></div>
      </div>

      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title">Histórico de valores</span>
          <div class="dias-toggle">
            <button class="dias-btn active" data-dias="30">30d</button>
            <button class="dias-btn" data-dias="90">90d</button>
          </div>
        </div>
        <div style="position:relative; height:220px;">
          <canvas id="grafico-historico"></canvas>
          <div id="chart-empty" class="empty-state" style="display:none;">
            Nenhum dado para exibir no período
          </div>
        </div>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Parceiro</th>
              <th>Tipo</th>
              <th>Último valor</th>
              <th>Última coleta</th>
              <th>Tenho acesso</th>
            </tr>
          </thead>
          <tbody id="tabela-parceiros-body">
            <tr><td colspan="5" class="loading">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ═══════════ SITES ═══════════ -->
    <div id="tab-sites" class="tab-content">

      <div class="card form-card">
        <h3>Cadastrar novo site</h3>
        <div id="form-feedback" class="feedback hidden"></div>
        <div class="form-row">
          <input type="text" id="input-nome"      placeholder="Nome">
          <input type="url"  id="input-url"       placeholder="https://www.comparemania.com.br/...">
          <input type="text" id="input-categoria" placeholder="Categoria">
          <button class="btn btn-primary" id="btn-cadastrar">Cadastrar</button>
        </div>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>URL</th>
              <th>Categoria</th>
              <th>Status</th>
              <th>Última coleta</th>
              <th>Próx. coleta</th>
              <th>Alerta</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="tabela-sites-body">
            <tr><td colspan="8" class="loading">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ═══════════ CONFIG ═══════════ -->
    <div id="tab-config" class="tab-content">
      <div class="card config-card">
        <h3>Agendador</h3>
        <div id="config-feedback" class="feedback hidden"></div>
        <div class="config-form">
          <label>
            Horário fixo diário
            <input type="time" id="input-scrape-time">
          </label>
          <label>
            Intervalo de re-execução (horas)
            <input type="number" id="input-interval" min="1" step="1">
          </label>
          <button class="btn btn-primary" id="btn-salvar-config">Salvar configurações</button>
        </div>
      </div>
    </div>

  </main>

  <!-- Modal de confirmação -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <p id="modal-mensagem"></p>
      <div class="modal-btns">
        <button class="btn btn-ghost" id="modal-cancelar">Cancelar</button>
        <button class="btn btn-danger" id="modal-confirmar">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
